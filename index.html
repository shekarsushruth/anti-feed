<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Anti-Feed — Daily Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2ECE0;--paper-2:#EAE2D2;--ink:#1F1B16;--ink-soft:#5C5246;
    --ink-faint:#8B7F6E;--accent:#C0451B;--accent-deep:#9A340F;--line:#D6CCB8;
    --gold:#B8893A;--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:30px}
  .wrap{max-width:700px;margin:0 auto;padding:0 20px}

  header.mast{text-align:center;padding:46px 20px 28px;border-bottom:2px solid var(--ink);
    max-width:700px;margin:0 auto}
  .mast .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.32em;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px}
  .mast h1{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(44px,12vw,82px);
    line-height:.9;letter-spacing:-.025em;font-optical-sizing:auto}
  .mast h1 .the{display:block;font-size:.32em;letter-spacing:.18em;font-weight:500;
    text-transform:uppercase;color:var(--accent);margin-bottom:8px;font-style:normal}
  .mast .tagline{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:15px;
    color:var(--ink-soft);margin-top:16px}
  .mast .dateline{display:flex;justify-content:center;gap:14px;align-items:center;margin-top:18px;
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.06em;
    color:var(--ink-faint);flex-wrap:wrap}
  .mast .dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}

  .section-head{display:flex;align-items:baseline;gap:14px;margin:42px 0 2px}
  .section-head .ix{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);
    font-weight:500;flex-shrink:0}
  .section-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:13px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--ink)}
  .section-head .count{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint)}
  .section-head .rule{flex:1;height:1px;background:var(--line)}

  .story{border-bottom:1px solid var(--line)}
  .headline{width:100%;text-align:left;background:none;border:0;cursor:pointer;
    padding:15px 4px;display:flex;gap:14px;align-items:flex-start;font-family:inherit;
    color:inherit;transition:padding-left .2s ease}
  .headline:hover{padding-left:9px}
  .headline .num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);
    flex-shrink:0;margin-top:5px;width:22px}
  .headline .htext{flex:1}
  .headline .kicker{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--accent-deep);margin-bottom:4px;display:block}
  .headline h3{font-family:'Fraunces',serif;font-weight:600;font-size:18px;line-height:1.22;
    letter-spacing:-.01em;color:var(--ink)}
  .headline .chev{flex-shrink:0;width:20px;height:20px;margin-top:5px;color:var(--ink-faint);
    transition:transform .25s ease;display:flex;align-items:center;justify-content:center}
  .headline .chev::after{content:"";width:7px;height:7px;border-right:1.5px solid currentColor;
    border-bottom:1.5px solid currentColor;transform:rotate(45deg);margin-top:-2px}
  .story.open .chev{transform:rotate(180deg);color:var(--accent)}
  .story.open .headline h3{color:var(--accent-deep)}

  .detail{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .story.open .detail{max-height:1400px}
  .detail-inner{padding:0 4px 22px 40px}
  .detail .media{position:relative;aspect-ratio:16/9;border-radius:12px;overflow:hidden;
    background:linear-gradient(135deg,#ddd2bd,#cdbfa3);margin-bottom:14px}
  .detail .media img{width:100%;height:100%;object-fit:cover;display:block}
  .media .fallback{position:absolute;inset:0;display:flex;align-items:flex-end;padding:15px;
    background:radial-gradient(120% 100% at 0% 0%,rgba(192,69,27,.14),transparent 60%),
    linear-gradient(135deg,#e0d4be,#c9ba9d)}
  .media .fallback span{font-family:'Fraunces',serif;font-style:italic;font-size:12.5px;color:var(--ink-soft)}
  .detail p{font-size:14.5px;color:var(--ink-soft);margin-bottom:9px}
  .detail p strong{color:var(--ink);font-weight:600}
  .detail .caveat{font-size:12.5px;color:var(--ink-faint);margin-top:2px}
  .mini{list-style:none;margin-top:2px}
  .mini li{font-size:14px;color:var(--ink-soft);padding:6px 0;display:flex;gap:9px;border-bottom:1px solid var(--line)}
  .mini li:last-child{border-bottom:0}
  .mini li b{color:var(--ink);font-weight:600}
  .mini li::before{content:"♪";color:var(--accent);font-size:11px;flex-shrink:0;margin-top:3px}

  .watch{margin-top:4px;display:inline-flex;align-items:center;gap:9px;padding:8px 14px 8px 11px;
    background:transparent;border:1px solid var(--line);border-radius:999px;color:var(--ink);
    font-family:'Inter',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;transition:.18s ease}
  .watch:hover{border-color:var(--accent);color:var(--accent)}
  .watch .tri{width:17px;height:17px;border-radius:50%;background:var(--accent);flex-shrink:0;
    display:flex;align-items:center;justify-content:center}
  .watch .tri::after{content:"";border-left:5px solid #fff;border-top:3.5px solid transparent;
    border-bottom:3.5px solid transparent;margin-left:2px}
  .watch .dur{color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;font-size:10.5px}
  .player{margin-top:12px;border-radius:10px;overflow:hidden;aspect-ratio:16/9;display:none}
  .player.open{display:block}
  .player iframe{width:100%;height:100%;border:0;display:block}
  .linkout{margin-top:4px;display:inline-flex;align-items:center;gap:8px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);
    text-decoration:none;border-bottom:1px dashed var(--line);padding-bottom:2px}
  .linkout:hover{color:var(--accent)}
  .linkout::after{content:"↗"}

  .story.deep .detail-inner .skin{background:var(--ink);border-radius:12px;padding:20px;margin-left:-4px}
  .story.deep .skin p{color:#C9BEAC}
  .story.deep .skin p strong{color:#F2ECE0}
  .story.deep .skin .caveat{color:#8B7F6E}
  .story.deep .skin .watch{border-color:#3d3426;color:#F2ECE0}
  .story.deep .skin .watch .dur{color:#8B7F6E}

  .ending{text-align:center;margin:58px auto 0;padding:46px 24px 8px;border-top:2px solid var(--ink);max-width:700px}
  .ending .mark{font-family:'Fraunces',serif;font-size:32px;color:var(--accent);margin-bottom:16px}
  .ending h4{font-family:'Fraunces',serif;font-weight:600;font-size:25px;letter-spacing:-.01em;margin-bottom:12px}
  .ending p{color:var(--ink-soft);font-size:15px;max-width:44ch;margin:0 auto 6px}
  .ending .next{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.08em;
    color:var(--ink-faint);margin-top:20px;text-transform:uppercase}

  @media (max-width:520px){.detail-inner{padding-left:24px}.headline h3{font-size:17px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}html{scroll-behavior:auto}}
</style>
</head>
<body>

<header class="mast">
  <div class="eyebrow">The Daily Edition</div>
  <h1><span class="the">The</span>Anti-Feed</h1>
  <div class="tagline">read it like a paper. open what pulls you. then it ends.</div>
  <div class="dateline">
    <span id="ed-date">—</span><span class="dot"></span>
    <span id="ed-time">—</span><span class="dot"></span><span id="ed-count">—</span>
  </div>
</header>

<main class="wrap" id="main"></main>

<footer class="ending">
  <div class="mark">✦</div>
  <h4>That's everything.</h4>
  <p>You've read today's edition. Nothing more is loading. Go make something with your day.</p>
  <div class="next">Next edition · tomorrow · 1:00 PM</div>
</footer>

<script>
  /* ---- interaction (unchanged behavior from the static template) ---- */
  function toggle(btn){
    var story=btn.closest('.story');
    var isOpen=story.classList.contains('open');
    document.querySelectorAll('.story.open').forEach(function(s){if(s!==story){s.classList.remove('open');closePlayers(s);}});
    if(isOpen){story.classList.remove('open');closePlayers(story);}else{story.classList.add('open');}
  }
  function closePlayers(scope){scope.querySelectorAll('.player.open').forEach(function(p){p.classList.remove('open');p.innerHTML='';});}
  function togglePlay(btn){
    var player=btn.nextElementSibling;
    var isOpen=player.classList.contains('open');
    document.querySelectorAll('.player.open').forEach(function(p){if(p!==player){p.classList.remove('open');p.innerHTML='';}});
    if(isOpen){player.classList.remove('open');player.innerHTML='';return;}
    var ytid=btn.getAttribute('data-ytid');
    if(ytid){player.innerHTML='<iframe src="https://www.youtube.com/embed/'+ytid+'?rel=0" title="video" allow="accelerometer; encrypted-media; picture-in-picture" allowfullscreen></iframe>';}
    else{player.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1F1B16;color:#C9BEAC;font-family:\'Fraunces\',serif;font-style:italic;font-size:14px;text-align:center;padding:20px">Video plays here in the live app —<br>the real YouTube clip loads on tap.</div>';}
    player.classList.add('open');
  }

  /* ---- renderer: builds the same markup from edition.json ---- */
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  function mediaHTML(st){
    if(!st.media_label && !st.image) return '';
    var label='<div class="fallback"><span>'+esc(st.media_label||'')+'</span></div>';
    var img=st.image?'<img src="'+esc(st.image)+'" alt="'+esc(st.media_label||'')+'" style="position:absolute;inset:0;z-index:1">':'';
    return '<div class="media">'+label+img+'</div>';
  }
  function miniHTML(items){
    if(!items||!items.length) return '';
    var lis=items.map(function(h){return '<li><span>'+h+'</span></li>';}).join('');
    return '<ul class="mini">'+lis+'</ul>';
  }
  function videoHTML(v){
    if(!v) return '';
    var id=v.id?' data-ytid="'+esc(v.id)+'"':'';
    return '<button class="watch" onclick="togglePlay(this)"'+id+'><span class="tri"></span> '+
      esc(v.label||'Watch')+' <span class="dur">'+esc(v.duration||'')+'</span></button><div class="player"></div>';
  }
  function linkoutHTML(l){
    if(!l||!l.label) return '';
    var url=l.url||'#';
    var attrs=(url&&url!=='#')?' href="'+esc(url)+'" target="_blank" rel="noopener"':' href="#" onclick="return false"';
    return '<a class="linkout"'+attrs+'>'+esc(l.label)+'</a>';
  }
  function storyInner(st){
    var html=mediaHTML(st);
    (st.body||[]).forEach(function(p){html+='<p>'+p+'</p>';});
    if(st.caveat) html+='<p class="caveat">'+esc(st.caveat)+'</p>';
    html+=miniHTML(st.mini);
    html+=videoHTML(st.video);
    html+=linkoutHTML(st.linkout);
    return html;
  }
  function storyHTML(st,num){
    var n=String(num).padStart(2,'0');
    var inner=storyInner(st);
    if(st.deep) inner='<div class="skin">'+inner+'</div>';
    return '<div class="story'+(st.deep?' deep':'')+'">'+
      '<button class="headline" onclick="toggle(this)"><span class="num">'+n+'</span>'+
      '<span class="htext"><span class="kicker">'+esc(st.kicker||'')+'</span><h3>'+esc(st.headline||'')+'</h3></span>'+
      '<span class="chev"></span></button>'+
      '<div class="detail"><div class="detail-inner">'+inner+'</div></div></div>';
  }
  function sectionHTML(sec,startNum){
    var stories=sec.stories||[];
    var head='<div class="section-head"><span class="ix">'+esc(sec.index||'')+'</span>'+
      '<h2>'+esc(sec.title||'')+'</h2><span class="count">'+stories.length+'</span><span class="rule"></span></div>';
    var body=stories.map(function(st,i){return storyHTML(st,startNum+i);}).join('');
    return head+body;
  }
  function render(data){
    var meta=data.meta||{};
    var sections=data.sections||[];
    var total=sections.reduce(function(a,s){return a+((s.stories||[]).length);},0);
    document.getElementById('ed-date').textContent=meta.date_label||'—';
    document.getElementById('ed-time').textContent=meta.time_label||'—';
    var count=(typeof meta.story_count==='number')?meta.story_count:total;
    document.getElementById('ed-count').textContent=count+(count===1?' story':' stories');

    var html='',num=1;
    sections.forEach(function(sec){html+=sectionHTML(sec,num);num+=(sec.stories||[]).length;});
    var main=document.getElementById('main');
    main.innerHTML=html;
    main.querySelectorAll('.media img').forEach(function(img){
      img.addEventListener('error',function(){img.style.display='none';});
    });
  }
  function showError(){
    document.getElementById('main').innerHTML=
      '<p style="text-align:center;color:var(--ink-faint);padding:48px 0;'+
      'font-family:\'Fraunces\',serif;font-style:italic;font-size:15px">'+
      'Today’s edition couldn’t load. Try again in a moment.</p>';
  }
  fetch('edition.json',{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(render)
    .catch(showError);
</script>
</body>
</html>
